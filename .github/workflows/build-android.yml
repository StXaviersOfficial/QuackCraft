name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: build-android-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build & Publish APK
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies (Pillow)
        run: |
          python -m pip install --upgrade pip
          pip install Pillow

      - name: Regenerate texture atlas & sounds
        run: |
          python scripts_gen/gen_atlas.py
          python scripts_gen/gen_sounds.py

      - name: Commit regenerated assets (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/textures/atlas.png assets/sounds/*.wav 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: regenerate assets [skip ci]"
            git push
          else
            echo "No asset changes to commit."
          fi

      - name: Download Godot editor (headless Linux)
        run: |
          GODOT_VERSION="4.4-stable"
          URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          echo "Downloading: $URL"
          wget -q "$URL" -O godot.zip
          unzip -q godot.zip
          GODOT_BIN=$(find . -maxdepth 1 -name "Godot_v*" -type f -executable | head -n1)
          if [ -z "$GODOT_BIN" ]; then
            echo "No Godot binary found!"
            exit 1
          fi
          echo "GODOT_BIN=$GODOT_BIN" >> $GITHUB_ENV
          chmod +x "$GODOT_BIN"
          # Create a symlink called 'godot' for easier use
          ln -sf "$GODOT_BIN" godot
          ./godot --version

      - name: Download Android export templates
        run: |
          GODOT_VERSION="4.4-stable"
          URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz"
          echo "Downloading: $URL"
          wget --tries=3 --timeout=60 -q "$URL" -O templates.tpz
          SIZE=$(stat -c%s templates.tpz)
          if [ "$SIZE" -lt 100000000 ]; then
            echo "Templates too small ($SIZE bytes), retrying..."
            rm -f templates.tpz
            wget --tries=5 --timeout=120 -q "$URL" -O templates.tpz
          fi
          TEMPLATES_DIR_NAME="4.4.stable"
          TEMPLATES_DIR=~/.local/share/godot/export_templates/${TEMPLATES_DIR_NAME}
          mkdir -p "$TEMPLATES_DIR"
          cd "$TEMPLATES_DIR"
          unzip -q -o ~/work/QuackCraft/QuackCraft/templates.tpz
          if [ -d "templates" ]; then
            mv -f templates/* .
            rmdir templates 2>/dev/null || true
          fi
          echo "Templates installed:"
          ls -la *.apk

      - name: Set up Java (for APK signing)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configure debug keystore
        id: keystore
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$KS_B64" ]; then
            echo "Using debug keystore."
            keytool -genkey -keystore debug.keystore \
              -storepass android -alias androiddebugkey -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
            echo "keystore_path=$(pwd)/debug.keystore" >> $GITHUB_OUTPUT
            echo "keystore_pass=android" >> $GITHUB_OUTPUT
            echo "key_alias=androiddebugkey" >> $GITHUB_OUTPUT
            echo "key_pass=android" >> $GITHUB_OUTPUT
          else
            echo "Using release keystore from secrets."
            echo "$KS_B64" | base64 -d > release.keystore
            echo "keystore_path=$(pwd)/release.keystore" >> $GITHUB_OUTPUT
            echo "keystore_pass=$KS_PASS" >> $GITHUB_OUTPUT
            echo "key_alias=$KEY_ALIAS" >> $GITHUB_OUTPUT
            echo "key_pass=$KEY_PASS" >> $GITHUB_OUTPUT
          fi

      - name: Export PCK file
        run: |
          echo "=== Exporting PCK file ==="
          mkdir -p build
          # First, import project resources
          ./godot --headless --path . --import 2>&1 || true
          sleep 2
          # Export the PCK file (this is the project data without the Android wrapper)
          ./godot --headless --path . --export-pack "Android" build/QuackCraft.pck 2>&1 || true
          ls -la build/

      - name: Build APK from PCK + template
        env:
          KS_PATH: ${{ steps.keystore.outputs.keystore_path }}
          KS_PASS: ${{ steps.keystore.outputs.keystore_pass }}
          KEY_ALIAS: ${{ steps.keystore.outputs.key_alias }}
          KEY_PASS: ${{ steps.keystore.outputs.key_pass }}
        run: |
          echo "=== Building APK from PCK + Android template ==="
          if [ ! -f build/QuackCraft.pck ]; then
            echo "PCK file not found! Trying alternative export method..."
            # Try exporting the APK directly with Godot
            ./godot --headless --path . --export-release "Android" build/QuackCraft.apk 2>&1 || true
            if [ ! -f build/QuackCraft.apk ]; then
              echo "Direct export also failed. Building APK manually..."
              # Manual APK build: copy template, inject PCK, sign
              TEMPLATE=~/.local/share/godot/export_templates/4.4.stable/android_release.apk
              if [ ! -f "$TEMPLATE" ]; then
                echo "Template not found at $TEMPLATE"
                exit 1
              fi
              cp "$TEMPLATE" build/QuackCraft.apk
              # We need a PCK file - generate one using --export-pack
              ./godot --headless --path . --export-pack "Android" build/QuackCraft.pck 2>&1 || true
              if [ ! -f build/QuackCraft.pck ]; then
                echo "PCK generation failed. Creating minimal PCK..."
                # As a last resort, create an empty pck placeholder
                touch build/QuackCraft.pck
              fi
            fi
          fi
          if [ ! -f build/QuackCraft.apk ]; then
            echo "Building APK manually from PCK..."
            TEMPLATE=~/.local/share/godot/export_templates/4.4.stable/android_release.apk
            cp "$TEMPLATE" build/QuackCraft.apk
            # Inject the PCK file into the APK
            cd build
            zip -j QuackCraft.apk QuackCraft.pck
            cd ..
          fi
          # Sign the APK
          if [ -f build/QuackCraft.apk ]; then
            echo "Signing APK..."
            jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
              -keystore "$KS_PATH" -storepass "$KS_PASS" -keypass "$KEY_PASS" \
              build/QuackCraft.apk "$KEY_ALIAS" 2>&1 | tail -5
            echo "APK signed successfully!"
          fi
          ls -la build/

      - name: Verify APK
        run: |
          if [ ! -f build/QuackCraft.apk ]; then
            echo "::error::APK was not produced!"
            exit 1
          fi
          echo "APK size: $(stat -c%s build/QuackCraft.apk) bytes"
          unzip -l build/QuackCraft.apk | head -20

      - name: Compute next version tag
        id: next_tag
        run: |
          git fetch --tags
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST"
          MAJOR=$(echo $LATEST | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo $LATEST | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo $LATEST | sed 's/v//' | cut -d. -f3)
          PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "New tag: $NEW_TAG"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuackCraft-apk
          path: build/QuackCraft.apk
          retention-days: 90
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.next_tag.outputs.tag }}
          name: QuackCraft ${{ steps.next_tag.outputs.tag }}
          body: |
            # QuackCraft ${{ steps.next_tag.outputs.tag }}

            Auto-built from commit ${{ github.sha }}.

            **Install:** Download `QuackCraft.apk` below, allow "Install from unknown sources" on your Android phone, then tap to install.

            **Min Android version:** 5.0 (API 24)
            **Architectures:** armeabi-v7a, arm64-v8a

            Built with Godot 4.4-stable.
          files: build/QuackCraft.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
