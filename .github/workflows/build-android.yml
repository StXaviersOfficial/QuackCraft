name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-android-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build & Publish APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GODOT_VERSION: "4.4-stable"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow cairosvg

      - name: Regenerate texture atlas & sounds
        run: |
          python scripts_gen/gen_atlas.py
          python scripts_gen/gen_sounds.py

      - name: Commit regenerated assets (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/textures/atlas.png assets/sounds/*.wav 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: regenerate assets [skip ci]"
            git push || true
          else
            echo "No asset changes to commit."
          fi

      # ── Android SDK (needed for Gradle build) ──────────────────────────
      - name: Install Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 platforms;android-24 build-tools;34.0.0 platform-tools'

      - name: Download Godot editor (Linux x86_64)
        run: |
          URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          echo "Downloading: $URL"
          wget -q "$URL" -O godot.zip
          unzip -q godot.zip
          GODOT_BIN=$(find . -maxdepth 1 -name "Godot_v*" -type f -executable | head -n1)
          if [ -z "$GODOT_BIN" ]; then
            echo "No Godot binary found!"
            exit 1
          fi
          chmod +x "$GODOT_BIN"
          ln -sf "$GODOT_BIN" godot
          ./godot --version

      - name: Download & install Android export templates
        run: |
          URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz"
          echo "Downloading: $URL"
          wget --tries=5 --timeout=120 -q "$URL" -O templates.tpz
          SIZE=$(stat -c%s templates.tpz)
          if [ "$SIZE" -lt 100000000 ]; then
            echo "Templates too small ($SIZE bytes), aborting"
            exit 1
          fi
          TEMPLATES_DIR=~/.local/share/godot/export_templates/4.4.stable
          mkdir -p "$TEMPLATES_DIR"
          cd "$TEMPLATES_DIR"
          unzip -q -o ~/work/QuackCraft/QuackCraft/templates.tpz
          if [ -d "templates" ]; then
            mv -f templates/* .
            rmdir templates 2>/dev/null || true
          fi
          echo "Templates installed:"
          ls -la *.apk *.zip 2>/dev/null

      - name: Install Android Gradle build template into project
        run: |
          # Extract android_source.zip (the Gradle build template) into android/build/
          TEMPLATE_SRC=~/.local/share/godot/export_templates/4.4.stable/android_source.zip
          if [ ! -f "$TEMPLATE_SRC" ]; then
            echo "::error::android_source.zip not found in templates dir"
            ls -la ~/.local/share/godot/export_templates/4.4.stable/
            exit 1
          fi
          mkdir -p android/build
          unzip -q -o "$TEMPLATE_SRC" -d android/build/
          echo "Android build template installed:"
          ls android/build/ | head -20
          test -f android/build/gradlew || { echo "gradlew missing!"; exit 1; }
          chmod +x android/build/gradlew
          echo "Gradle wrapper OK."

      - name: Generate Android launcher icons (if not present)
        run: |
          if [ ! -f android/icons/main_192.png ]; then
            echo "Icons missing — generating from icon.svg"
            python -c "
          import os, cairosvg
          os.makedirs('android/icons', exist_ok=True)
          MAIN_SVG = open('icon.svg').read()
          cairosvg.svg2png(bytestring=MAIN_SVG.encode(), write_to='android/icons/main_192.png', output_width=192, output_height=192)
          cairosvg.svg2png(bytestring=MAIN_SVG.encode(), write_to='android/icons/adaptive_fg_432.png', output_width=432, output_height=432)
          BG_SVG = '<svg width=\"432\" height=\"432\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"432\" height=\"432\" fill=\"#5d8a3a\"/></svg>'
          cairosvg.svg2png(bytestring=BG_SVG.encode(), write_to='android/icons/adaptive_bg_432.png', output_width=432, output_height=432)
          print('Icons generated.')
          "
          fi
          ls -la android/icons/

      # ── Keystore: use release secret if available, else generate debug ─
      - name: Set up keystore (release secret OR auto-generated debug)
        id: keystore
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          mkdir -p keystore
          if [ -n "$KS_B64" ]; then
            echo "Using release keystore from secrets."
            echo "mode=release" >> $GITHUB_OUTPUT
            echo "$KS_B64" | base64 -d > keystore/release.keystore
            echo "keystore_path=$(pwd)/keystore/release.keystore" >> $GITHUB_OUTPUT
            echo "keystore_pass=$KS_PASS" >> $GITHUB_OUTPUT
            echo "key_alias=$KEY_ALIAS" >> $GITHUB_OUTPUT
            echo "key_pass=$KEY_PASS" >> $GITHUB_OUTPUT
          else
            echo "No release keystore secret — generating a debug keystore (APK will be debug-signed, still installable)."
            echo "mode=debug" >> $GITHUB_OUTPUT
            keytool -genkey -keystore keystore/debug.keystore \
              -storepass android -alias androiddebugkey -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
            echo "keystore_path=$(pwd)/keystore/debug.keystore" >> $GITHUB_OUTPUT
            echo "keystore_pass=android" >> $GITHUB_OUTPUT
            echo "key_alias=androiddebugkey" >> $GITHUB_OUTPUT
            echo "key_pass=android" >> $GITHUB_OUTPUT
          fi
          ls -la keystore/

      - name: Patch export_presets.cfg with keystore credentials
        env:
          KS_PATH: ${{ steps.keystore.outputs.keystore_path }}
          KS_PASS: ${{ steps.keystore.outputs.keystore_pass }}
          KEY_ALIAS: ${{ steps.keystore.outputs.key_alias }}
          KEY_PASS: ${{ steps.keystore.outputs.key_pass }}
        run: |
          python3 << 'PYEOF'
          import os
          path = "export_presets.cfg"
          with open(path, "r") as f:
              cfg = f.read()
          ks_path = os.environ["KS_PATH"]
          ks_pass = os.environ["KS_PASS"]
          key_alias = os.environ["KEY_ALIAS"]
          key_pass = os.environ["KEY_PASS"]
          # Replace keystore/release path and credentials
          import re
          # Replace the release keystore path
          cfg = re.sub(r'keystore/release="[^"]*"', f'keystore/release="{ks_path}"', cfg)
          cfg = re.sub(r'keystore/release_user="[^"]*"', f'keystore/release_user="{key_alias}"', cfg)
          cfg = re.sub(r'keystore/release_password="[^"]*"', f'keystore/release_password="{ks_pass}"', cfg)
          # Also set debug keystore (same one, for safety)
          cfg = re.sub(r'keystore/debug="[^"]*"', f'keystore/debug="{ks_path}"', cfg)
          cfg = re.sub(r'keystore/debug_user="[^"]*"', f'keystore/debug_user="{key_alias}"', cfg)
          cfg = re.sub(r'keystore/debug_password="[^"]*"', f'keystore/debug_password="{ks_pass}"', cfg)
          # Ensure signed=true
          cfg = cfg.replace('package/signed=false', 'package/signed=true')
          with open(path, "w") as f:
              f.write(cfg)
          print("Patched export_presets.cfg keystore credentials.")
          # Show keystore section (mask password)
          for line in cfg.splitlines():
              if 'keystore' in line.lower():
                  if 'password' in line.lower():
                      print(f"  {line.split('=')[0]}=***REDACTED***")
                  else:
                      print(f"  {line}")
          PYEOF
          # Also set env vars for Godot (it reads these too)
          echo "GODOT_ANDROID_KEYSTORE_DEBUG=$KS_PATH" >> $GITHUB_ENV
          echo "GODOT_ANDROID_KEYSTORE_DEBUG_USER=$KEY_ALIAS" >> $GITHUB_ENV
          echo "GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD=$KS_PASS" >> $GITHUB_ENV
          echo "GODOT_ANDROID_KEYSTORE_RELEASE=$KS_PATH" >> $GITHUB_ENV
          echo "GODOT_ANDROID_KEYSTORE_RELEASE_USER=$KEY_ALIAS" >> $GITHUB_ENV
          echo "GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD=$KS_PASS" >> $GITHUB_ENV

      - name: Configure Godot editor settings (Android SDK + Java SDK paths)
        run: |
          # Godot 4.4's can_export() reads SDK paths via EDITOR_GET() which
          # reads from ~/.config/godot/editor-settings.cfg. The defaults
          # are populated from env vars at registration time, but to be
          # safe we write the file explicitly with the correct paths.
          # IMPORTANT: use <<EOF (unquoted) so shell expands the vars.
          mkdir -p ~/.config/godot
          JAVA_HOME_DIR="${JAVA_HOME:-$(dirname $(dirname $(readlink -f $(which java))))}"
          ANDROID_SDK_DIR="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          cat > ~/.config/godot/editor-settings.cfg << EOF
          ; Godot editor settings (auto-generated by CI)
          [editor]

          [export]

          export/android/android_sdk_path = "$ANDROID_SDK_DIR"
          export/android/java_sdk_path = "$JAVA_HOME_DIR"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          export/android/force_system_user = false
          export/android/shutdown_adb_on_exit = true
          export/android/one_click_deploy_clear_previous_install = false
          export/android/use_wifi_for_remote_debug = false
          export/android/wifi_remote_debug_host = "localhost"
          EOF
          # Strip leading whitespace (heredoc adds 10 spaces of indent)
          sed -i 's/^[[:space:]]*//' ~/.config/godot/editor-settings.cfg
          echo "Wrote editor-settings.cfg:"
          cat ~/.config/godot/editor-settings.cfg

      - name: Import project resources (headless)
        run: |
          echo "=== Importing project resources ==="
          ./godot --headless --path . --import 2>&1 | tail -30 || true
          sleep 2
          echo "Import done."

      - name: Build & export signed APK via Godot --export-release (Gradle build)
        env:
          KS_PATH: ${{ steps.keystore.outputs.keystore_path }}
          KS_PASS: ${{ steps.keystore.outputs.keystore_pass }}
          KEY_ALIAS: ${{ steps.keystore.outputs.key_alias }}
          KEY_PASS: ${{ steps.keystore.outputs.key_pass }}
        run: |
          echo "=== Exporting release APK via Gradle build (may take 5-10 min) ==="
          mkdir -p build
          # -v for verbose diagnostics. The Gradle build bakes the correct
          # app name, package name, version, icons, and signing config into
          # the APK. We DO NOT fall back to the template-copy approach —
          # that produces an APK with default godot-game / godot-project-name
          # metadata which is exactly the bug we're fixing.
          ./godot --headless --path . -v --export-release "Android" build/QuackCraft.apk 2>&1 | tee export.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "=== Export exit code: $EXIT_CODE ==="
          ls -la build/ || true
          if [ ! -f build/QuackCraft.apk ]; then
            echo "::error::Gradle export failed — APK not produced."
            echo "=== Full export log ==="
            cat export.log
            echo "=== Gradle reports (if any) ==="
            if [ -d android/build ]; then
              find android/build -name "*.txt" -path "*reports*" 2>/dev/null | head -10 | while read f; do
                echo "--- $f ---"
                tail -100 "$f"
              done
              find android/build -name "*.txt" 2>/dev/null | xargs grep -l "FAILURE\|Exception\|error:" 2>/dev/null | head -5 | while read f; do
                echo "--- $f (errors) ---"
                cat "$f"
              done
            fi
            exit 1
          fi
          APK_SIZE=$(stat -c%s build/QuackCraft.apk)
          echo "APK built successfully: $APK_SIZE bytes"
          # Sanity check: APK should be > 30MB (has godot libs) and < 200MB
          if [ "$APK_SIZE" -lt 30000000 ]; then
            echo "::warning::APK suspiciously small ($APK_SIZE bytes) — may be missing assets."
          fi

      - name: Verify APK (signing + metadata)
        run: |
          if [ ! -f build/QuackCraft.apk ]; then
            echo "::error::APK not found!"
            exit 1
          fi
          APK_SIZE=$(stat -c%s build/QuackCraft.apk)
          echo "APK size: $APK_SIZE bytes"
          echo "=== APK contents (first 25 entries) ==="
          unzip -l build/QuackCraft.apk | head -30
          echo ""
          echo "=== Verify signature (v1+v2+v3) ==="
          APKSIGNER=$(find "$ANDROID_HOME" -name apksigner 2>/dev/null | head -1)
          if [ -z "$APKSIGNER" ]; then
            APKSIGNER=$(find /usr/local/lib/android/sdk -name apksigner 2>/dev/null | head -1)
          fi
          if [ -n "$APKSIGNER" ]; then
            "$APKSIGNER" verify --verbose --print-certs build/QuackCraft.apk
          else
            echo "WARNING: apksigner not found, skipping signature verification"
          fi
          echo ""
          echo "=== Verify app metadata with aapt ==="
          AAPT=$(find "$ANDROID_HOME" /usr/local/lib/android/sdk -name aapt2 2>/dev/null | head -1)
          if [ -z "$AAPT" ]; then
            AAPT=$(find "$ANDROID_HOME" /usr/local/lib/android/sdk -name aapt 2>/dev/null | head -1)
          fi
          if [ -n "$AAPT" ]; then
            "$AAPT" dump badging build/QuackCraft.apk 2>&1 | head -20
            echo ""
            # Critical sanity check: app name MUST be 'QuackCraft' (not 'godot-project-name')
            BADGING=$("$AAPT" dump badging build/QuackCraft.apk 2>&1)
            if echo "$BADGING" | grep -q "application-label:'godot-project-name'"; then
              echo "::error::FAIL: App label is still 'godot-project-name' (template default). The Gradle build did not bake in the project name."
              exit 1
            fi
            if echo "$BADGING" | grep -q "package: name='com.godot.game'"; then
              echo "::error::FAIL: Package name is still 'com.godot.game' (template default). The Gradle build did not bake in the package name."
              exit 1
            fi
            echo "PASS: App metadata is correctly customized."
          fi

      - name: Compute next version tag
        id: next_tag
        run: |
          git fetch --tags
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST"
          MAJOR=$(echo $LATEST | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo $LATEST | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo $LATEST | sed 's/v//' | cut -d. -f3)
          PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "New tag: $NEW_TAG"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuackCraft-apk
          path: build/QuackCraft.apk
          retention-days: 90
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.next_tag.outputs.tag }}
          name: QuackCraft ${{ steps.next_tag.outputs.tag }}
          body: |
            # QuackCraft ${{ steps.next_tag.outputs.tag }}

            Auto-built from commit ${{ github.sha }}.

            **Install:**
            1. Download `QuackCraft.apk` below.
            2. On your Android phone, enable **"Install unknown apps"** for your file manager / browser.
            3. Tap the APK to install.

            **Min Android version:** 7.0 (API 24)
            **Target SDK:** 34 (Android 14)
            **Architectures:** armeabi-v7a (32-bit), arm64-v8a (64-bit)

            Built with Godot 4.4-stable via Gradle.
          files: build/QuackCraft.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
