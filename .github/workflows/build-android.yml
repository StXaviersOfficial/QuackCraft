name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: build-android-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build & Publish APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies (Pillow)
        run: |
          python -m pip install --upgrade pip
          pip install Pillow

      - name: Regenerate texture atlas & sounds
        run: |
          python scripts_gen/gen_atlas.py
          python scripts_gen/gen_sounds.py

      - name: Commit regenerated assets (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/textures/atlas.png assets/sounds/*.wav 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: regenerate assets [skip ci]"
            git push
          else
            echo "No asset changes to commit."
          fi

      - name: Determine Godot version
        id: godot_version
        run: |
          # Pin to a specific stable Godot 4.x release that has matching Android templates.
          echo "version=4.4-stable" >> $GITHUB_OUTPUT
          echo "Using Godot 4.4-stable"

      - name: Download Godot editor (headless Linux)
        run: |
          GODOT_VERSION="${{ steps.godot_version.outputs.version }}"
          URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          echo "Downloading: $URL"
          wget -q "$URL" -O godot.zip
          ls -la godot.zip
          unzip -q godot.zip
          ls -la
          # Find the Godot binary
          GODOT_BIN=$(find . -maxdepth 1 -name "Godot_v*" -type f -executable | head -n1)
          if [ -z "$GODOT_BIN" ]; then
            echo "No Godot binary found after unzip!"
            ls -la
            exit 1
          fi
          echo "GODOT_BIN=$GODOT_BIN" >> $GITHUB_ENV
          chmod +x "$GODOT_BIN"
          ./"$GODOT_BIN" --version

      - name: Download Android export templates
        run: |
          GODOT_VERSION="${{ steps.godot_version.outputs.version }}"
          URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz"
          echo "Downloading: $URL"
          # Use --tries and --timeout for resilience on the large .tpz
          wget --tries=3 --timeout=60 --retry-connrefused -q "$URL" -O templates.tpz
          ls -la templates.tpz
          # Sanity check: should be > 200 MB
          SIZE=$(stat -c%s templates.tpz)
          if [ "$SIZE" -lt 100000000 ]; then
            echo "Templates file too small ($SIZE bytes) — download likely truncated. Retrying..."
            rm -f templates.tpz
            wget --tries=5 --timeout=120 -q "$URL" -O templates.tpz
            ls -la templates.tpz
          fi
          # Godot 4.x expects templates at:
          #   ~/.local/share/godot/export_templates/<version-dot-stable>/
          # e.g. ~/.local/share/godot/export_templates/4.4.stable/
          # The .tpz contains a "templates/" subdir with files like android-release.apk etc.
          TEMPLATES_DIR_NAME=$(echo "$GODOT_VERSION" | sed 's/-stable/.stable/')
          TEMPLATES_DIR=~/.local/share/godot/export_templates/${TEMPLATES_DIR_NAME}
          mkdir -p "$TEMPLATES_DIR"
          cd "$TEMPLATES_DIR"
          unzip -q -o ~/work/QuackCraft/QuackCraft/templates.tpz
          # The .tpz has a templates/ subdir; move its contents up
          if [ -d "templates" ]; then
            mv -f templates/* .
            rmdir templates 2>/dev/null || true
          fi
          echo "Templates installed at: $(pwd)"
          ls -la

      - name: Set up Android SDK & Gradle
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'
          sdk-version: '34'

      - name: Set up Java (for Gradle build)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Verify Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls -la $ANDROID_HOME 2>/dev/null || ls -la $ANDROID_SDK_ROOT
          # Accept all SDK licenses
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          # Install required SDK components
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" > /dev/null 2>&1 || true
          # Make sure gradle is available
          gradle --version 2>&1 | head -3 || echo "Gradle not yet installed"

      - name: Create build output directory
        run: mkdir -p build

      - name: Configure debug keystore (if secrets not set)
        id: keystore
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$KS_B64" ]; then
            echo "No keystore secret — using debug keystore."
            echo "use_debug=true" >> $GITHUB_OUTPUT
            # Generate a Godot-style debug keystore
            keytool -keytool -genkey -keystore debug.keystore \
              -storepass android -alias androiddebugkey -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US" 2>&1 || \
              keytool -genkey -keystore debug.keystore \
              -storepass android -alias androiddebugkey -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
            echo "keystore_path=$(pwd)/debug.keystore" >> $GITHUB_OUTPUT
            echo "keystore_pass=android" >> $GITHUB_OUTPUT
            echo "key_alias=androiddebugkey" >> $GITHUB_OUTPUT
            echo "key_pass=android" >> $GITHUB_OUTPUT
          else
            echo "Using release keystore from secrets."
            echo "use_debug=false" >> $GITHUB_OUTPUT
            echo "$KS_B64" | base64 -d > release.keystore
            echo "keystore_path=$(pwd)/release.keystore" >> $GITHUB_OUTPUT
            echo "keystore_pass=$KS_PASS" >> $GITHUB_OUTPUT
            echo "key_alias=$KEY_ALIAS" >> $GITHUB_OUTPUT
            echo "key_pass=$KEY_PASS" >> $GITHUB_OUTPUT
          fi

      - name: Patch export_presets.cfg with keystore paths
        env:
          KS_PATH: ${{ steps.keystore.outputs.keystore_path }}
          KS_PASS: ${{ steps.keystore.outputs.keystore_pass }}
          KEY_ALIAS: ${{ steps.keystore.outputs.key_alias }}
          KEY_PASS: ${{ steps.keystore.outputs.key_pass }}
        run: |
          # Update the export_presets.cfg with our keystore
          python3 - <<'EOF'
          import os
          path = "export_presets.cfg"
          with open(path, "r") as f:
              content = f.read()
          ks_path = os.environ["KS_PATH"]
          ks_pass = os.environ["KS_PASS"]
          key_alias = os.environ["KEY_ALIAS"]
          key_pass = os.environ["KEY_PASS"]
          content = content.replace(
              'keystore/debug=""',
              f'keystore/debug="{ks_path}"'
          )
          content = content.replace(
              'keystore/debug_user=""',
              f'keystore/debug_user="{key_alias}"'
          )
          content = content.replace(
              'keystore/debug_password=""',
              f'keystore/debug_password="{ks_pass}"'
          )
          content = content.replace(
              'keystore/release=""',
              f'keystore/release="{ks_path}"'
          )
          content = content.replace(
              'keystore/release_user=""',
              f'keystore/release_user="{key_alias}"'
          )
          content = content.replace(
              'keystore/release_password=""',
              f'keystore/release_password="{ks_pass}"'
          )
          # Set signed=true
          content = content.replace('package/signed=false', 'package/signed=true')
          with open(path, "w") as f:
              f.write(content)
          print("Patched export_presets.cfg")
          EOF

      - name: Configure Godot editor settings (Android SDK path)
        run: |
          # Godot stores editor settings in ~/.config/godot/editor-settings.cfg on Linux
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor-settings.cfg <<'EOF'
          [editor]
          export/android/android_sdk_path = "$ANDROID_HOME"
          export/android/debug_keystore = ""
          export/android/debug_keystore_user = ""
          export/android/debug_keystore_password = ""
          export/android/force_system_user = false
          export/android/shutdown_adb_on_exit = true
          EOF
          # Strip leading whitespace from each line (heredoc with <<'EOF' preserves our indentation)
          sed -i 's/^[[:space:]]*//' ~/.config/godot/editor-settings.cfg
          # Replace placeholder with actual ANDROID_HOME
          sed -i "s|\$ANDROID_HOME|$ANDROID_HOME|g" ~/.config/godot/editor-settings.cfg
          echo "Wrote editor-settings.cfg:"
          cat ~/.config/godot/editor-settings.cfg

      - name: Export Android APK
        run: |
          # We're already in the repo root (the working directory of the job).
          echo "Working directory: $(pwd)"
          echo "ANDROID_HOME=$ANDROID_HOME"
          ./"$GODOT_BIN" --headless --import --verbose 2>&1 | tail -30
          # Make sure build/ exists
          mkdir -p build
          # Run export; show all output for debugging
          ./"$GODOT_BIN" --headless --export-release "Android" build/QuackCraft.apk 2>&1 | tail -80
          # Retry once if it failed (sometimes the first import is incomplete)
          if [ ! -f build/QuackCraft.apk ]; then
            echo "First export failed, retrying..."
            ./"$GODOT_BIN" --headless --export-release "Android" build/QuackCraft.apk 2>&1 | tail -80
          fi
          ls -la build/

      - name: Verify APK
        run: |
          if [ ! -f build/QuackCraft.apk ]; then
            echo "::error::APK was not produced!"
            exit 1
          fi
          # Verify it's a valid ZIP/APK
          unzip -l build/QuackCraft.apk | head -10

      - name: Compute next version tag
        id: next_tag
        run: |
          # Fetch latest tag
          git fetch --tags
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST"
          # Parse vMAJOR.MINOR.PATCH and increment PATCH
          MAJOR=$(echo $LATEST | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo $LATEST | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo $LATEST | sed 's/v//' | cut -d. -f3)
          PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "New tag: $NEW_TAG"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuackCraft-apk
          path: build/QuackCraft.apk
          retention-days: 90
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.next_tag.outputs.tag }}
          name: QuackCraft ${{ steps.next_tag.outputs.tag }}
          body: |
            # QuackCraft ${{ steps.next_tag.outputs.tag }}

            Auto-built from commit ${{ github.sha }}.

            **Install:** Download `QuackCraft.apk` below, allow "Install from unknown sources" on your Android phone, then tap to install.

            **Min Android version:** 5.0 (API 21)
            **Target Android version:** 14 (API 34)
            **Architectures:** armeabi-v7a, arm64-v8a

            Built with Godot 4.3-stable on ${{ github.event.head_commit.timestamp }}.
          files: build/QuackCraft.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
